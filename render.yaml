services:
  - type: web
    name: argon-like-blog
    env: node
    plan: free
    buildCommand: npm install -g pnpm@9.12.3 && pnpm install --no-frozen-lockfile
    startCommand: node src/server.js
    envVars:
      - key: NODE_VERSION
        value: 20.18.1
      - key: NODE_ENV
        value: production
      - key: PGSSL
        value: true
      - key: MAX_UPLOAD_MB
        value: 5
