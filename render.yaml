services:
  - type: web
    name: argon-like-blog
    env: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.18.1
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_PATH
        value: /console-7f92x
      - key: PGSSL
        value: true
      - key: MAX_UPLOAD_MB
        value: 5
