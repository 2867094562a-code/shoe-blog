<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Argon Lite Blog</title>
  <meta name="description" content="一个不依赖 WordPress 的独立博客模板，界面与动效参考 Xiaomi HyperOS 的轻盈感。" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="scrollProgress" class="scroll-progress"></div>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="bg-orb orb-c"></div>
  <div class="mouse-aura" id="mouseAura"></div>

  <div class="quick-island" id="quickIsland" aria-live="polite">
    <span class="island-pulse"></span>
    <span id="islandText">轻盈加载中</span>
  </div>

  <header class="topbar glass-nav">
    <a class="brand" href="/">
      <span id="brandLogo" class="brand-logo-wrap">
        <span class="brand-mark"></span>
      </span>
      <span id="brandText">Argon Lite Blog</span>
    </a>
    <nav class="nav nav-pill">
      <span id="headerNavLinks" class="header-nav-links">
        <a href="/">首页</a>
        <a href="/archive">归档</a>
      </span>
      <button id="themePaletteBtn" class="icon-btn" title="颜色主题">🎨</button>
      <button id="themeBtn" class="icon-btn" title="切换明暗">🌙</button>
      <div id="themeMenu" class="theme-menu hidden" aria-label="颜色主题切换"></div>
    </nav>
  </header>

  <section class="hero hero-hyper hero-tilt-card tilt-card" id="heroSection" data-tilt-strength="7" data-tilt-move="7">
    <div class="hero-noise"></div>
    <div class="hero-glow hero-glow-a"></div>
    <div class="hero-glow hero-glow-b"></div>

    <div class="hero-grid">
      <div class="hero-copy">
        <div class="hero-chip-row reveal-up">
          <span class="hero-chip tilt-card" data-tilt-strength="10" data-tilt-move="4">独立部署</span>
          <span class="hero-chip tilt-card" data-tilt-strength="10" data-tilt-move="4">前后端一体</span>
          <span class="hero-chip tilt-card" data-tilt-strength="10" data-tilt-move="4">轻量 CMS</span>
        </div>
        <p class="eyebrow reveal-up delay-1">HYPEROS INSPIRED · MOTION UI</p>
        <h1 id="heroTitle" class="reveal-up delay-2">轻盈、清爽、适合个人博客</h1>
        <p id="heroText" class="reveal-up delay-3">加载中...</p>
        <div class="searchbar glass-input reveal-up delay-4">
          <input id="searchInput" type="search" placeholder="搜索文章标题、摘要、内容..." autocomplete="off" />
          <button id="searchBtn">搜索</button>
        </div>
      </div>

      <div class="hero-stage reveal-up delay-3" id="heroStage" aria-hidden="true">
        <div class="stage-orbit orbit-one"></div>
        <div class="stage-orbit orbit-two"></div>

        <div class="phone-shell floating-device">
          <div class="phone-island"></div>
          <div class="phone-screen">
            <div class="phone-card big"></div>
            <div class="phone-row"><span></span><span></span></div>
            <div class="phone-card"></div>
            <div class="phone-card small"></div>
          </div>
        </div>

        <div id="heroCards" class="hero-dynamic-cards"></div>
      </div>
    </div>

    <div class="motion-marquee" aria-hidden="true">
      <span>GLASS · FLUID · LIGHT · FAST · HYPER BLOG ·</span>
      <span>GLASS · FLUID · LIGHT · FAST · HYPER BLOG ·</span>
    </div>
  </section>

  <section id="featureGrid" class="feature-grid-wrap" aria-live="polite"></section>

  <section id="projectShowcase" class="showcase-wrap" aria-live="polite"></section>

  <section id="friendLinks" class="friends-wrap" aria-live="polite"></section>

  <div class="layout layout-hyper">
    <aside class="sidebar">
      <section class="card profile-card profile-card-pro reveal-up">
        <div id="avatar" class="avatar"></div>
        <h2 id="authorName">站长</h2>
        <p id="authorBio">加载中...</p>
        <div class="stats stats-soft">
          <a href="/archive"><b id="statPosts">0</b><span>文章</span></a>
          <a href="/archive"><b id="statCategories">0</b><span>分类</span></a>
          <a href="/archive"><b id="statTags">0</b><span>标签</span></a>
        </div>
      </section>

      <section class="card side-card side-card-pro reveal-up delay-1">
        <div class="section-title-wrap">
          <h3>分类</h3>
          <span class="section-dot"></span>
        </div>
        <div id="categoryList" class="chip-list muted">加载中...</div>
      </section>

      <section class="card side-card side-card-pro reveal-up delay-2">
        <div class="section-title-wrap">
          <h3>标签</h3>
          <span class="section-dot"></span>
        </div>
        <div id="tagList" class="chip-list muted">加载中...</div>
      </section>

      <section class="card side-card side-card-pro reveal-up delay-3">
        <div class="section-title-wrap">
          <h3>快捷导航</h3>
          <span class="section-dot"></span>
        </div>
        <div id="quickNavList" class="quick-nav-list muted">后台可编辑</div>
      </section>
    </aside>

    <main id="app" class="content page-surface" aria-live="polite"></main>
  </div>

  <div id="musicPlayer" class="music-player hidden" aria-live="polite"></div>
  <button id="toTop" class="float-btn" title="回到顶部">↑</button>
  <footer class="footer card reveal-up" id="footerText">© Argon Lite Blog</footer>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
