<!doctype html>
<html lang="zh-CN" data-template="mobile">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Argon Lite Blog</title>
  <meta name="description" content="移动端专用模板：更适合手机阅读、发布内容浏览和后台站点展示。" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="mobile-template">
  <div id="scrollProgress" class="scroll-progress"></div>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="mobile-safe-glow"></div>

  <div class="quick-island mobile-island" id="quickIsland" aria-live="polite">
    <span class="island-pulse"></span>
    <span id="islandText">手机模板已启用</span>
  </div>

  <header class="mobile-topbar glass-nav">
    <a class="brand mobile-brand" href="/">
      <span id="brandLogo" class="brand-logo-wrap"><span class="brand-mark"></span></span>
      <span id="brandText">Argon Lite Blog</span>
    </a>
    <div class="mobile-actions">
      <button id="themePaletteBtn" class="icon-btn" title="颜色主题">🎨</button>
      <button id="themeBtn" class="icon-btn" title="跟随系统 / 手动切换">🌙</button>
      <div id="themeMenu" class="theme-menu mobile-theme-menu hidden" aria-label="颜色主题切换"></div>
    </div>
  </header>

  <nav id="headerNavLinks" class="mobile-nav-tabs" aria-label="站点导航">
    <a href="/">首页</a>
    <a href="/archive">归档</a>
  </nav>

  <main class="mobile-shell">
    <section class="mobile-hero hero hero-hyper" id="heroSection">
      <div class="hero-noise"></div>
      <div class="hero-glow hero-glow-a"></div>
      <div class="hero-glow hero-glow-b"></div>
      <div class="mobile-hero-content">
        <div class="hero-chip-row reveal-up">
          <span class="hero-chip">手机适配</span>
          <span class="hero-chip">自动明暗</span>
          <span class="hero-chip">轻量动效</span>
        </div>
        <p class="eyebrow reveal-up delay-1">MOBILE TEMPLATE · AUTO THEME</p>
        <h1 id="heroTitle" class="reveal-up delay-2">轻盈、清爽、适合个人博客</h1>
        <p id="heroText" class="reveal-up delay-3">加载中...</p>
        <div class="searchbar glass-input reveal-up delay-4">
          <input id="searchInput" type="search" placeholder="搜索文章、页面、标签..." autocomplete="off" />
          <button id="searchBtn">搜索</button>
        </div>
      </div>
      <div id="heroCards" class="mobile-hero-cards"></div>
    </section>

    <section class="mobile-profile-strip card reveal-up">
      <div id="avatar" class="avatar"></div>
      <div>
        <h2 id="authorName">站长</h2>
        <p id="authorBio">加载中...</p>
      </div>
      <div class="mobile-stats">
        <a href="/archive"><b id="statPosts">0</b><span>文章</span></a>
        <a href="/archive"><b id="statCategories">0</b><span>分类</span></a>
        <a href="/archive"><b id="statTags">0</b><span>标签</span></a>
      </div>
    </section>

    <section id="featureGrid" class="feature-grid-wrap mobile-feature-wrap" aria-live="polite"></section>
    <section id="projectShowcase" class="showcase-wrap" aria-live="polite"></section>
    <section id="friendLinks" class="friends-wrap" aria-live="polite"></section>

    <section class="mobile-taxonomy card reveal-up">
      <div class="section-title-wrap"><h3>分类</h3><span class="section-dot"></span></div>
      <div id="categoryList" class="chip-list muted">加载中...</div>
      <div class="section-title-wrap mobile-tag-title"><h3>标签</h3><span class="section-dot"></span></div>
      <div id="tagList" class="chip-list muted">加载中...</div>
    </section>

    <section class="mobile-quick card reveal-up">
      <div class="section-title-wrap"><h3>快捷导航</h3><span class="section-dot"></span></div>
      <div id="quickNavList" class="quick-nav-list muted">后台可编辑</div>
    </section>

    <main id="app" class="content page-surface mobile-content" aria-live="polite"></main>
  </main>

  <div id="musicPlayer" class="music-player hidden" aria-live="polite"></div>
  <button id="toTop" class="float-btn" title="回到顶部">↑</button>
  <footer class="footer card reveal-up" id="footerText">© Argon Lite Blog</footer>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
